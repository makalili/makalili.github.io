<!DOCTYPE html>
<html>
<head>
  <title>Gimme 5 TL</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h1>gimme 5 tl</h1>

  <!-- Butonlar -->
  <button onclick="verTikla()">ver</button>
  <button onclick="vermeTikla()" id="vermeBtn">verme</button>

  <br><br>

  <!-- KEDİ GIF -->
  <img id="gif" src="kedi gif.gif" style="display:none; width:300px;">

  <!-- Yazı -->
  <p id="yazi" style="display:none;">satın alımınız için teşekkürler :3</p>

  <script>
    function verTikla() {
      // VER butonu direkt gif açar
      document.getElementById("gif").style.display = "block";
      document.getElementById("yazi").style.display = "block";
    }

    function vermeTikla() {
      let btn = document.getElementById("vermeBtn");

      if (btn.innerText === "verme") {
        btn.innerText = "emin misin";
      } 
      else if (btn.innerText === "emin misin") {
        btn.innerText = "hayır sen emin değilsin";
      } 
      else if (btn.innerText === "hayır sen emin değilsin") {
        btn.innerText = "ver";
      } 
      else if (btn.innerText === "ver") {
        // SONUNDA YİNE VER → GIF
        document.getElementById("gif").style.display = "block";
        document.getElementById("yazi").style.display = "block";
      }
    }
  </script>

</body>
</html>
