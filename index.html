<!DOCTYPE html>
<html>
<head>
  <title>Gimme 5 TL</title>
</head>
<body id="body" style="text-align:center; font-family:sans-serif;">

  <h1>gimme 5 tl</h1>

  <!-- Butonlar -->
  <button onclick="verTikla()" style="font-size:25px; padding:15px 30px;">ver</button>
  <button onclick="vermeTikla()" id="vermeBtn" style="font-size:25px; padding:15px 30px;">verme</button>

  <br><br>

  <!-- KEDİ GIF (ORTALI) -->
  <img id="gif" src="kedi gif.gif" 
       style="display:none; width:300px; display:block; margin:auto;">

  <!-- Yazı -->
  <p id="yazi" style="display:none; font-size:20px;">
    satın alımınız için teşekkürler :3
  </p>

  <!-- MÜZİK -->
  <audio id="muzik" src="muzik.mp3"></audio>

  <script>
    function verTikla() {
      document.getElementById("gif").style.display = "block";
      document.getElementById("yazi").style.display = "block";

      // arka plan değiş
      document.getElementById("body").style.backgroundImage = "url('rg.gif')";
      document.getElementById("body").style.backgroundSize = "cover";

      // müzik çal
      document.getElementById("muzik").play();
    }

    function vermeTikla() {
      let btn = document.getElementById("vermeBtn");

      if (btn.innerText === "verme") {
        btn.innerText = "emin misin";
      } 
      else if (btn.innerText === "emin misin") {
        btn.innerText = "hayır sen emin değilsin";
      } 
      else if (btn.innerText === "hayır sen emin değilsin") {
        btn.innerText = "ver";
      } 
      else if (btn.innerText === "ver") {
        verTikla();
      }
    }
  </script>

</body>
</html>
